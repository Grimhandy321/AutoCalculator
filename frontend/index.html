<!DOCTYPE html>
<html>
<head>
    <title>Car AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-matrix"></script>
</head>

<body class="bg-light">

<div class="container py-5">
    <h1 class="mb-4">Car Predictor</h1>

    <div class="card p-4 mb-4 shadow-sm">
        <input type="file" id="imageInput" class="form-control mb-2">
        <button onclick="predict()" class="btn btn-primary">Predict</button>
        <p id="result"></p>
        <p id="confidence" class="text-muted"></p>
    </div>

    <div class="card p-4 mb-4 shadow-sm">
        <div class="row g-2">
            <div class="col-md-3">
                <label>Brand</label>
                <select id="brand" class="form-select"></select>
            </div>
            <div class="col-md-3">
                <label>Model</label>
                <select id="model" class="form-select"></select>
            </div>
            <div class="col-md-3">
                <label>Mileage</label>
                <input id="mileage" type="number" class="form-control">
            </div>
            <div class="col-md-3">
                <label>Engine</label>
                <select id="engine" class="form-select">
                    <option>petrol</option>
                    <option>diesel</option>
                    <option>electric</option>
                </select>
            </div>
        </div>

        <button onclick="estimate()" class="btn btn-success mt-3">Estimate</button>
        <p id="priceResult"></p>
    </div>

    <div class="card p-4 shadow-sm">
        <canvas id="accuracyChart"></canvas>
        <canvas id="brandMatrix"></canvas>
        <table class="table mt-3">
            <tbody id="samplesTable"></tbody>
        </table>
    </div>
</div>

<script src="/frontend/script.js"></script>
</body>
</html>
