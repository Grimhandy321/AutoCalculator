<!DOCTYPE html>
<html>
<head>
    <title>Car AI</title>
</head>
<body>

<h1> Car Predictor</h1>


<h2>1. Predict from Image</h2>

<input type="file" id="imageInput">
<button onclick="predict()">Predict</button>

<p id="result"></p>

<hr>

<!-- PRICE PART -->
<h2>2. Estimate Price</h2>

<label>Brand:</label>
<select id="brand"></select>

<label>Model:</label>
<select id="model"></select>

<button onclick="estimate()">Estimate</button>

<p id="priceResult"></p>

<script>
const API = "http://localhost:8000";


async function loadBrands() {
    let res = await fetch(`${API}/data`);
    let data = await res.json();

    const brandSelect = document.getElementById("brand");

    data.brands.forEach(b => {
        let opt = document.createElement("option");
        opt.value = b;
        opt.text = b;
        brandSelect.appendChild(opt);
    });

    loadModels(brandSelect.value);
}

async function loadModels(brand) {
    let res = await fetch(`${API}/models/${brand}`);
    let data = await res.json();

    const modelSelect = document.getElementById("model");
    modelSelect.innerHTML = "";

    data.models.forEach(m => {
        let opt = document.createElement("option");
        opt.value = m;
        opt.text = m;
        modelSelect.appendChild(opt);
    });
}

// brand change
document.getElementById("brand").addEventListener("change", (e) => {
    loadModels(e.target.value);
});


async function predict() {
    const file = document.getElementById("imageInput").files[0];

    let formData = new FormData();
    formData.append("file", file);

    let res = await fetch(`${API}/predict`, {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    document.getElementById("result").innerText =
        `Brand: ${data.brand}, Model: ${data.model}, Price: ${data.price}€`;
}


async function estimate() {
    const brand = document.getElementById("brand").value;
    const model = document.getElementById("model").value;

    let res = await fetch(`${API}/price`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ brand, model })
    });

    let data = await res.json();

    document.getElementById("priceResult").innerText =
        `Estimated price: ${data.price}€`;
}

loadBrands();
</script>

</body>
</html>
